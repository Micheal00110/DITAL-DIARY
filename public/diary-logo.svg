<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <circle cx="256" cy="256" r="256" fill="url(#gradient)"/>
  
  <!-- Book/Diary icon -->
  <g transform="translate(128, 128)">
    <!-- Left page -->
    <rect x="20" y="40" width="100" height="140" rx="8" fill="white" opacity="0.95"/>
    
    <!-- Right page -->
    <rect x="136" y="40" width="100" height="140" rx="8" fill="white" opacity="0.95"/>
    
    <!-- Book spine/binding -->
    <rect x="115" y="30" width="26" height="160" rx="4" fill="url(#spineGradient)"/>
    
    <!-- Lines on left page -->
    <line x1="35" y1="70" x2="105" y2="70" stroke="#10b981" stroke-width="3" opacity="0.6"/>
    <line x1="35" y1="90" x2="105" y2="90" stroke="#10b981" stroke-width="3" opacity="0.6"/>
    <line x1="35" y1="110" x2="105" y2="110" stroke="#10b981" stroke-width="3" opacity="0.6"/>
    <line x1="35" y1="130" x2="105" y2="130" stroke="#10b981" stroke-width="3" opacity="0.6"/>
    
    <!-- Lines on right page -->
    <line x1="151" y1="70" x2="221" y2="70" stroke="#2563eb" stroke-width="3" opacity="0.6"/>
    <line x1="151" y1="90" x2="221" y2="90" stroke="#2563eb" stroke-width="3" opacity="0.6"/>
    <line x1="151" y1="110" x2="221" y2="110" stroke="#2563eb" stroke-width="3" opacity="0.6"/>
    <line x1="151" y1="130" x2="221" y2="130" stroke="#2563eb" stroke-width="3" opacity="0.6"/>
  </g>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="spineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
